version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pi-dependencies:
        patterns:
          - "@earendil-works/*"
      dev-tooling:
        patterns:
          - "@types/*"
          - tsx
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
